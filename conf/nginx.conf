#sub_path_only rewrite ^__PATH__$ __PATH__/ permanent;
location __PATH__/ {

  # Path to source
  alias __INSTALL_DIR__/public/;

  index index.php;

  # Common parameter to increase upload size limit in conjunction with dedicated php-fpm file
  client_max_body_size 50M;

  # Slim 4 front controller: route everything that isn't a real file through
  # index.php. The fallback goes through a named location instead of being a
  # literal URI argument to try_files: with `alias` in the location, try_files's
  # internal redirect to `__PATH__/index.php` corrupts $uri to `index.php` (no
  # __PATH__ prefix) on the second access phase, which makes SSOWat fail to
  # match the app's permission and 302-redirect XHRs to the SSO portal. The
  # named-location form does a clean rewrite so the second pass sees the right
  # URI and SSOWat allows it.
  try_files $uri $uri/ @__APP___index;
  location ~ ^__PATH__/index\.php(/|$) {
    fastcgi_split_path_info ^(.+?\.php)(/.*)$;
    fastcgi_pass unix:/var/run/php/php__PHP_VERSION__-fpm-__APP__.sock;

    fastcgi_index index.php;
    include fastcgi_params;
    fastcgi_param REMOTE_USER $remote_user;
    # Forward the Authorization header so PHP-FPM populates PHP_AUTH_USER/PW,
    # which AgenDAV's HttpBasic auth method (enabled in settings.php) reads.
    fastcgi_param HTTP_AUTHORIZATION $http_authorization;
    fastcgi_param PATH_INFO $fastcgi_path_info;
    fastcgi_param SCRIPT_FILENAME $request_filename;
  }

  location ~ \.php$ {
    return 404;
  }

  # Include SSOWAT user panel.
  include conf.d/yunohost_panel.conf.inc;
}

location @__APP___index {
  rewrite ^ __PATH__/index.php last;
}
