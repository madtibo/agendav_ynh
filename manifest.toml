#:schema https://raw.githubusercontent.com/YunoHost/apps/master/schemas/manifest.v2.schema.json

packaging_format = 2

id = "agendav"
name = "AgenDAV"
description.en = "CalDAV web client"
description.fr = "Client web pour CalDAV"

version = "3.0.0~ynh1"

maintainers = []

[upstream]
license = "GPL-3.0"
# TODO: switch back to agendav/agendav once it ships 3.0.0 upstream (PHP 8.5 / Slim 4 rewrite).
code = "https://github.com/madtibo/agendav"
demo = "https://demo.yunohost.org/agendav"
admindoc = "https://agendav.readthedocs.io"

[integration]
yunohost = ">= 12.0"
architectures = "all"
multi_instance = false
ldap = true
sso = true
disk = "10M"
ram.build = "100M"
ram.runtime = "10M"

[install]
    [install.domain]
    type = "domain"

    [install.path]
    type = "path"
    default = "/agendav"

    [install.init_main_permission]
    type = "group"
    default = "all_users"

    [install.language]
    ask.en = "Choose the application language"
    ask.fr = "Choisissez la langue de l'application"
    type = "select"
    choices = ["de_DE", "en", "es_ES", "fr_FR", "it_IT", "nl_NL"]
    default = "en"

[resources]
    [resources.sources.main]
    url = "https://github.com/madtibo/agendav/releases/download/3.0.0/agendav-3.0.0.tar.gz"
    sha256 = "3494c415cad23305c49a8bbc5f705624d6e88d2308e0a1536d220723f6a6c7e6"
    autoupdate.strategy = "latest_github_tag"

    [resources.system_user]

    [resources.install_dir]

    [resources.permissions]
    main.url = "/"

    [resources.apt]
    packages = "php8.5-fpm, php8.5-cli, php8.5-ctype, php8.5-curl, php8.5-mbstring, php8.5-xml, php8.5-mysql, php8.5-intl, mariadb-server"

    [resources.database]
    type = "mysql"
